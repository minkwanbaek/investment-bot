app:
  name: investment-bot
  environment: local
trading:
  mode: live
  base_currency: KRW
  symbols:
    - BTC/KRW
    - ETH/KRW
    - SOL/KRW
  dynamic_symbol_selection: true
  dynamic_symbol_top_n: 10
  starting_cash: 10000000
  min_order_notional: 5000
risk:
  max_risk_per_trade_pct: 20.0
  max_daily_loss_pct: 3.0
  max_drawdown_pct: 10.0
auto_trade:
  enabled: true
  symbol: BTC/KRW
  strategy_name: trend_following
  timeframe: 1h
  limit: 8
  interval_seconds: 300
  min_krw_balance: 15000
  base_entry_notional: 10000
  target_allocation_pct: 20.0
  meaningful_order_notional: 10000
  max_pending_seconds: 600
  cooldown_cycles: 1
  stop_loss_pct: 1.5
  partial_take_profit_pct: 2.0
  trailing_stop_pct: 1.0
  partial_sell_ratio: 0.5
  max_total_exposure_pct: 60.0
  min_managed_position_notional: 10000.0
strategies:
  trend_following:
    enabled: true
  mean_reversion:
    enabled: true
  dca:
    enabled: true
